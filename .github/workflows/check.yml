name: Check Availability

on:
  schedule:
    # 5× daily at Dutch winter time (CET = UTC+1):
    # 08:00 CET = 07:00 UTC
    - cron: "0 7 * * *"
    # 11:00 CET = 10:00 UTC
    - cron: "0 10 * * *"
    # 14:00 CET = 13:00 UTC
    - cron: "0 13 * * *"
    # 16:00 CET = 15:00 UTC
    - cron: "0 15 * * *"
    # 21:00 CET = 20:00 UTC
    - cron: "0 20 * * *"
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      checker:
        description: "Which checker to run (leave empty to run both)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - acv
          - centerparcs

jobs:
  check-acv:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.checker == '' || github.event.inputs.checker == 'acv' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dev dependencies
        run: npm ci

      - name: Run ACV trailer availability check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOWNSHIP: ${{ secrets.TOWNSHIP || '16' }}
        run: npm run run -- --checker=acv

      - name: Commit updated availability cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add availability_cache.json
          git diff --staged --quiet || git commit -m "chore: update acv availability cache [skip ci]"
          git push

  check-centerparcs:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.checker == '' || github.event.inputs.checker == 'centerparcs' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dev dependencies
        run: npm ci

      - name: Run Center Parcs availability check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run run -- --checker=centerparcs

      - name: Commit updated state cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add centerparcs_cache.json
          git diff --staged --quiet || git commit -m "chore: update centerparcs state cache [skip ci]"
          git push
