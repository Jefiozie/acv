<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .tabs {
      display: flex;
      gap: 4px;
      padding: 0 1rem;
      border-bottom: 2px solid var(--border, #e2e8f0);
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-muted, #64748b);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      color: var(--text, #1e293b);
    }

    .tab-btn.active {
      color: var(--accent, #2563eb);
      border-bottom-color: var(--accent, #2563eb);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>🏕️ Tracker</h1>
        <span id="last-updated" class="last-updated"></span>
      </div>
      <div class="header-right">
        <span id="refresh-indicator" class="refresh-indicator" aria-hidden="true">⟳</span>
        <button id="theme-toggle" class="theme-toggle" aria-label="Thema wisselen">🌙</button>
      </div>
    </div>
  </header>

  <main>
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" role="tab" aria-selected="true"  data-tab="centerparcs">🏕️ Center Parcs Prijzen</button>
      <button class="tab-btn"        role="tab" aria-selected="false" data-tab="aanhanger">🚗 Aanhanger Beschikbaarheid</button>
    </nav>

    <div class="tab-panel active" id="tab-centerparcs" role="tabpanel">
      <div id="centerparcs-charts" class="charts-grid">
        <p class="empty">Laden…</p>
      </div>
    </div>

    <div class="tab-panel" id="tab-aanhanger" role="tabpanel">
      <div id="availability-grid" class="avail-grid">
        <p class="empty">Laden…</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
