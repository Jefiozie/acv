name: Check ACV Trailer Availability

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Allow the workflow to push the updated cache back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dev dependencies
        run: npm ci

      - name: Run availability check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOWNSHIP: ${{ secrets.TOWNSHIP || '16' }}
        run: npm run check

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add availability_cache.json
          git diff --staged --quiet || git commit -m "chore: update availability cache [skip ci]"
          git push
