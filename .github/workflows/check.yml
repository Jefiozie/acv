name: Check ACV Trailer Availability

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dev dependencies
        run: npm ci

      - name: Run availability check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOWNSHIP: ${{ secrets.TOWNSHIP || '16' }}
          # Used to persist the availability cache between runs via a GitHub Gist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
        run: npm run check
